[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/resources"
  to = "/resources.html"
  status = 200

[[redirects]]
  from = "/harbor-library"
  to = "/resources.html"
  status = 200

[[redirects]]
  from = "/library"
  to = "/resources.html"
  status = 200

[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200

[[redirects]]
  from = "/philosophy"
  to = "/philosophy.html"
  status = 200

[[redirects]]
  from = "/sitemap"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/sitemap.uml"
  to = "/sitemap.xml"
  status = 301
